{% extends 'base.html' %}

{% block content %}

<div class="hero">
    <h1>🌿 Welcome to AyurBazaar</h1>
    <p>Har Ghar ka Natural Bazaar</p>
</div>

<div class="categories">
    <a href="/?category=Hair Care">Hair Care</a>
    <a href="/?category=Skin Care">Skin Care</a>
    <a href="/?category=Herbal Tea">Herbal Tea</a>
    <a href="/?category=Immunity">Immunity</a>
    <a href="/?category=Medicines">Medicines</a>
    <a href="/?category=Grocery">Grocery</a>
</div>

<form>
<input name="q" placeholder="Search products">
<button>Search</button>
</form>

<div class="products">
{% for p in products %}
<div class="product">
<img src="{{ url_for('static', filename='images/' + p[4]) }}">
<h3>{{p[1]}}</h3>
<p>₹{{p[2]}}</p>
<p>{{p[3]}}</p>
<a href="/add/{{p[0]}}">Add to Cart</a>
</div>
{% endfor %}
</div>

{% endblock %}
